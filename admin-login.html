<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מירב — כניסה לפאנל</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: 'Frank Ruhl Libre', serif; }
body {
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #2563EB 0%, #0891B2 50%, #7C3AED 100%);
  min-height: 100vh;
  padding: 1rem;
}
.login-container {
  background: white;
  border-radius: 12px;
  padding: 2rem;
  max-width: 380px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.login-header {
  text-align: center;
  margin-bottom: 2rem;
}
.login-header h1 {
  font-size: 2rem;
  color: #0F172A;
  margin-bottom: 0.5rem;
}
.login-header p {
  color: #64748B;
  font-size: 0.9rem;
}
.form-group {
  margin-bottom: 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}
label {
  font-size: 0.85rem;
  font-weight: 700;
  color: #0F172A;
  letter-spacing: 0.05em;
}
input {
  padding: 0.75rem 1rem;
  border: 1px solid #CBD5E1;
  border-radius: 6px;
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 1rem;
  color: #0F172A;
  transition: all 0.2s;
}
input:focus {
  outline: none;
  border-color: #2563EB;
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}
.btn-login {
  width: 100%;
  padding: 0.85rem;
  background: linear-gradient(135deg, #2563EB 0%, #0891B2 100%);
  color: white;
  border: none;
  border-radius: 6px;
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 0.5rem;
}
.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
}
.btn-login:active {
  transform: translateY(0);
}
.error {
  background: #FEE2E2;
  color: #991B1B;
  padding: 0.75rem;
  border-radius: 6px;
  font-size: 0.85rem;
  margin-bottom: 1rem;
  display: none;
}
.error.show {
  display: block;
}
.login-footer {
  text-align: center;
  margin-top: 1.5rem;
  font-size: 0.8rem;
  color: #64748B;
}
.lock-icon {
  font-size: 2.5rem;
  text-align: center;
  margin-bottom: 1rem;
}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <div class="lock-icon">🔐</div>
    <h1>מירב</h1>
    <p>פאנל ניהול</p>
  </div>

  <div class="error" id="error"></div>

  <div class="form-group">
    <label>שם משתמש</label>
    <input type="text" id="username" placeholder="admin" autofocus>
  </div>

  <div class="form-group">
    <label>סיסמה</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>

  <button class="btn-login" onclick="handleLogin()">כניסה לפאנל</button>

  <div class="login-footer">
    <p>פאנל ניהול בטוח עבור בעלות העסק</p>
  </div>
</div>

<script>
const DEFAULT_USERNAME = 'admin';
const DEFAULT_PASSWORD = 'merav123'; // ערוך לסיסמה חזקה יותר

function handleLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorEl = document.getElementById('error');

  if (!username || !password) {
    errorEl.textContent = 'בבקשה הזן שם משתמש וסיסמה';
    errorEl.classList.add('show');
    return;
  }

  if (username === DEFAULT_USERNAME && password === DEFAULT_PASSWORD) {
    // שמור את ה-session
    sessionStorage.setItem('admin_logged_in', 'true');
    sessionStorage.setItem('admin_username', username);
    // הפנה ל-admin.html
    window.location.href = 'admin.html';
  } else {
    errorEl.textContent = 'שם משתמש או סיסמה שגויה';
    errorEl.classList.add('show');
  }
}

// אפשר Enter להתחבר
document.getElementById('password').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') handleLogin();
});
</script>

</body>
</html>
